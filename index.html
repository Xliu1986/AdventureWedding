<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>冒険の結婚式</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-monospaced-jp@5.2.5/index.css" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=0.6.9-mobile-r2">

</head>

<body>

<canvas id="background"></canvas>

<!-- 游戏层（东京章节开始使用） -->
<div id="gameViewport" class="hidden"><canvas id="gameCanvas"></canvas></div>

<div id="chapterLocation" class="hidden">东京 · 春日漫步</div>

<div id="mobileControls" class="hidden" aria-label="游戏控制">

<div class="mobileDpad" aria-label="移动方向">
<button type="button" data-control="up" aria-label="向上移动">▲</button>
<button type="button" data-control="left" aria-label="向左移动">◀</button>
<button type="button" data-control="right" aria-label="向右移动">▶</button>
<button type="button" data-control="down" aria-label="向下移动">▼</button>
</div>

<div class="mobileActions" aria-label="操作按钮">
<button type="button" data-control="sprint" aria-label="按住冲刺">B</button>
<button type="button" data-control="action" aria-label="互动或继续对话">A</button>
</div>

</div>

<aside id="partyFrames" class="hidden" aria-label="同行伙伴">

<p class="partyTitle">同行伙伴</p>

<div class="partyFrame" data-party="mori"><span class="partyPortrait"></span><span>森</span></div>
<div class="partyFrame" data-party="le"><span class="partyPortrait"></span><span>乐乐</span></div>
<div class="partyFrame hidden" data-party="tuotuo"><span class="partyPortrait"></span><span>坨坨</span></div>
<div class="partyFrame hidden" data-party="dazhi"><span class="partyPortrait"></span><span>大痣</span></div>

</aside>

<div id="gameDialogue" class="hidden" role="dialog" aria-live="polite">

<div class="gameDialogueBox">

<div class="gameDialoguePortrait" aria-hidden="true"></div>

<p class="gameDialogueName">乐乐</p>

<p class="gameDialogueText"></p>

<span class="gameDialogueContinue">▮</span>

</div>

</div>

<main class="screen" id="titleScreen">

<header class="title">

<h1>冒険の結婚式</h1>

<p class="subtitle">
一段始于东京的故事
</p>

<p class="names">
森 × 乐
</p>

</header>

<section class="menu">

<button id="startButton">
PRESS START
</button>

</section>

<footer class="version">

Version 0.6.9<br>
Tokyo Memories

</footer>

</main>

<div id="dialog" class="hidden">

<div class="dialogBox">

<h2>欢迎</h2>

<p>

欢迎来到《冒険の結婚式》

<br><br>

第一章：

东京 · Tokyo

</p>

<button id="closeDialog">

开始旅程

</button>

</div>

</div>

<script src="main.js?v=0.6.9-mobile-r2"></script>

</body>

</html>

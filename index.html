<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>冒険の結婚式</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-monospaced-jp@5.2.5/index.css" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=0.9.2">

</head>

<body>

<canvas id="background"></canvas>

<!-- 游戏层（东京章节开始使用） -->
<div id="gameViewport" class="hidden"><canvas id="gameCanvas"></canvas></div>

<div id="chapterLocation" class="hidden">东京 · 春日漫步</div>

<div id="mobileControls" class="hidden" aria-label="游戏控制">

<div class="mobileDpad" aria-label="移动方向">
<button type="button" data-control="up" aria-label="向上移动">▲</button>
<button type="button" data-control="left" aria-label="向左移动">◀</button>
<button type="button" data-control="right" aria-label="向右移动">▶</button>
<button type="button" data-control="down" aria-label="向下移动">▼</button>
</div>

<div class="mobileActions" aria-label="操作按钮">
<button type="button" data-control="sprint" aria-label="按住冲刺">B</button>
<button type="button" data-control="action" aria-label="互动或继续对话">A</button>
</div>

</div>

<button id="characterMenuButton" class="hidden" type="button" aria-label="打开人物面板" aria-expanded="false">人物</button>

<section id="characterPanel" class="hidden" role="dialog" aria-modal="true" aria-label="同行者">

<div class="characterPanelBox">

<header class="characterPanelHeader">
<h2>同行者</h2>
<p class="characterPanelHint"><span class="desktopHint">B / ESC 关闭</span><span class="mobileHint">点击“关闭”返回</span></p>
</header>

<div class="characterGrid">

<article class="characterCard">
<div class="characterPortrait"><img data-character-portrait="mori" alt="森的像素肖像"></div>
<div><h3>森</h3><p>一个曾在当地较为不羁的厨师。</p></div>
</article>

<article class="characterCard">
<div class="characterPortrait"><img data-character-portrait="lele" alt="乐乐的像素肖像"></div>
<div><h3>乐乐</h3><p>古灵精怪的乐乐宝。</p></div>
</article>

<article class="characterCard">
<div class="characterPortrait"><img data-character-portrait="tuotuo" alt="坨坨的像素肖像"></div>
<div><h3>坨坨</h3><p>面冷心热的贴心喵。</p></div>
</article>

<article class="characterCard">
<div class="characterPortrait"><img data-character-portrait="dazhi" alt="大痣的像素肖像"></div>
<div><h3>大痣</h3><p>神经大条的暖暖喵。</p></div>
</article>

</div>

</div>

</section>

<section id="chapterCard" class="hidden" aria-live="polite" aria-label="章节标题">
<div class="chapterCardFrame">
<p class="chapterCardLabel"></p>
<h2 class="chapterCardTitleZh"></h2>
<p class="chapterCardTitleEn"></p>
<p class="chapterCardTheme"></p>
<p class="chapterCardMessage"></p>
</div>
</section>

<div id="gameDialogue" class="hidden" role="dialog" aria-live="polite">

<div class="gameDialogueBox">

<div class="gameDialoguePortrait" aria-hidden="true"></div>

<p class="gameDialogueName">乐乐</p>

<p class="gameDialogueText"></p>

<span class="gameDialogueContinue">▮</span>

</div>

</div>

<section id="openingPrologue" class="hidden" aria-live="polite" aria-label="故事开场">
<div class="openingPrologueText">
<p class="openingLine">一次奇妙的相遇</p>
<p class="openingLine">两个素不相识的有趣灵魂</p>
<p class="openingLine">三段美好的回忆</p>
<p class="openingLine">森与乐乐爱的冒险旅程就此开始</p>
</div>
<div class="openingPrologueCharacters" aria-hidden="true">
<img data-character-portrait="mori" alt="">
<img data-character-portrait="lele" alt="">
</div>
</section>

<main class="screen" id="titleScreen">

<header class="title">

<h1>冒険の結婚式</h1>

<p class="subtitle">
一段始于东京的故事
</p>

<p class="names">
森 × 乐
</p>

</header>

<section class="menu">

<button id="startButton">
PRESS START
</button>

</section>

<footer class="version">

Version 0.9.2<br>
Wedding Gateway

</footer>

</main>

<div id="dialog" class="hidden">

<div class="dialogBox">

<h2>欢迎</h2>

<p>

欢迎来到《冒険の結婚式》

<br><br>

第一章：

东京 · Tokyo

</p>

<button id="closeDialog">

开始旅程

</button>

</div>

</div>

<script src="data/characters.js?v=0.9.2"></script>
<script src="data/chapters.js?v=0.9.2"></script>
<script src="main.js?v=0.9.2-ittencho-line"></script>

</body>

</html>

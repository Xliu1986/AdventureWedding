<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>冒険の結婚式</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/@fontsource/fusion-pixel-12px-monospaced-jp@5.2.5/index.css" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=0.6.2">

</head>

<body>

<canvas id="background"></canvas>

<!-- 游戏层（东京章节开始使用） -->
<canvas id="gameCanvas" class="hidden"></canvas>

<div id="gameDialogue" class="hidden" role="dialog" aria-live="polite">

<div class="gameDialogueBox">

<p class="gameDialogueName">乐乐</p>

<p class="gameDialogueText">终于见到你了，<br>我是乐乐。</p>

<span class="gameDialogueContinue">▮</span>

</div>

</div>

<main class="screen" id="titleScreen">

<header class="title">

<h1>冒険の結婚式</h1>

<p class="subtitle">
一段始于东京的故事
</p>

<p class="names">
森 × 乐
</p>

</header>

<section class="menu">

<button id="startButton">
PRESS START
</button>

</section>

<footer class="version">

Version 0.6.2

</footer>

</main>

<div id="dialog" class="hidden">

<div class="dialogBox">

<h2>欢迎</h2>

<p>

欢迎来到《冒険の結婚式》

<br><br>

第一章：

东京 · Tokyo

</p>

<button id="closeDialog">

开始旅程

</button>

</div>

</div>

<script src="main.js?v=0.6.2"></script>

</body>

</html>
